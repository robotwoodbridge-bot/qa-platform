# =============================================================================
# Grafana Datasource Provisioning — Loki
# Auto-loaded on container start. No manual UI config needed.
# =============================================================================

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 5000
      timeout: 60
