# =============================================================================
# Azure Pipelines — API Contract Tests
# =============================================================================
# Runs the EcomBasic API contract suite (tests/api/) directly on the agent.
# No Docker/Terraform stack needed — these are pure HTTP tests, so this
# pipeline is much faster than the IaC smoke pipeline.
#
# HOW TO ACTIVATE:
#   Pipelines → New Pipeline → Azure Repos Git → robotkali
#   → Existing Azure Pipelines YAML file → ci/azure-pipelines-contract.yml
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - tests/api/**
      - keywords/api_keywords.robot
      - ci/azure-pipelines-contract.yml

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  RESULTS_DIR: $(Build.SourcesDirectory)/results
  ALLURE_DIR: $(Build.SourcesDirectory)/results/allure-results

stages:
  - stage: ContractTest
    displayName: API Contract Tests
    jobs:
      - job: contract
        displayName: Robot Framework (contract)
        timeoutInMinutes: 15

        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python 3.12
            inputs:
              versionSpec: "3.12"

          # Contract tests only need the API-testing subset of requirements —
          # installing the full file pulls in Playwright/browser deps for nothing.
          - script: |
              pip install \
                robotframework==7.0 \
                robotframework-requests==0.9.7 \
                requests==2.32.3 \
                jsonschema==4.23.0 \
                allure-robotframework==2.13.5 \
                PyYAML==6.0.2
            displayName: Install API test dependencies

          - script: |
              mkdir -p $(RESULTS_DIR) $(ALLURE_DIR)
              python -m robot \
                --outputdir $(RESULTS_DIR) \
                --include contract \
                --listener allure_robotframework:$(ALLURE_DIR) \
                tests/api/
            displayName: Run contract tests

          - task: PublishPipelineArtifact@1
            displayName: Publish Allure results
            condition: always()
            inputs:
              targetPath: $(ALLURE_DIR)
              artifact: allure-results-contract
              publishLocation: pipeline

          - task: PublishPipelineArtifact@1
            displayName: Publish RF logs
            condition: always()
            inputs:
              targetPath: $(RESULTS_DIR)
              artifact: robot-logs-contract
              publishLocation: pipeline

  - stage: Report
    displayName: Publish Allure Report
    dependsOn: ContractTest
    condition: always()
    jobs:
      - job: allure_report
        displayName: Generate Allure HTML Report
        steps:
          - checkout: none

          - task: DownloadPipelineArtifact@2
            displayName: Download Allure results
            inputs:
              artifact: allure-results-contract
              path: allure-results

          - script: |
              npm install -g allure-commandline
              allure generate allure-results --clean -o allure-report
            displayName: Generate Allure HTML report

          - task: PublishPipelineArtifact@1
            displayName: Publish Allure HTML report
            inputs:
              targetPath: allure-report
              artifact: allure-report-contract
              publishLocation: pipeline
