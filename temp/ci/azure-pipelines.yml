# =============================================================================
# Azure Pipelines — QA Pipeline (IaC mode)
# =============================================================================
# HOW TO ACTIVATE:
#   Pipelines → New Pipeline → Azure Repos Git → robotkali
#   → Existing Azure Pipelines YAML file → ci/azure-pipelines.yml
#
# What it does:
#   1. Checks out the repo
#   2. Pins Terraform 1.8.5 via direct install (no TerraformTaskV4 — it
#      crashes with provider:local / no cloud backend)
#   3. terraform init + apply  →  spins up playwright-runner, Loki, Grafana
#   4. Runs the Robot Framework smoke suite inside the container via docker exec
#   5. terraform destroy       →  tears down all containers (always runs)
#   6. Publishes Allure results and RF logs as pipeline artifacts
#   7. Publishes browser traces on failure
#   8. Sends email notification on failure (with log.html attached)
#   9. In a separate Report stage, generates and publishes the Allure HTML report
#
#  10. utils/run_iac.sh smoke/MVP/Regression/E2E/Integration with IaC stack
#  11. utils/parallel.sh smoke/MVP/Regression/E2E/Integration 4   [4=number of parallel jobs]
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: "1.8.5"
  TF_DIR: $(Build.SourcesDirectory)/infra/terraform
  RESULTS_DIR: $(Build.SourcesDirectory)/results
  ALLURE_DIR: $(Build.SourcesDirectory)/results/allure-results
  CONTAINER: qa-playwright-runner

stages:
  - stage: Test
    displayName: Run Tests via IaC
    jobs:
      - job: iac_test
        displayName: Terraform + Robot Framework (smoke)
        timeoutInMinutes: 45

        steps:
          # ------------------------------------------------------------------
          # 1. Checkout
          # ------------------------------------------------------------------
          - checkout: self

          # ------------------------------------------------------------------
          # 2. Pin Terraform version — skips install if already correct version.
          #    TerraformTaskV4 is not used (crashes with provider:local).
          #    Version controlled by TF_VERSION pipeline variable.
          # ------------------------------------------------------------------
          - bash: |
              INSTALLED=$(terraform version -json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['terraform_version'])" 2>/dev/null || echo "none")
              if [ "$INSTALLED" = "$(TF_VERSION)" ]; then
                echo "Terraform $(TF_VERSION) already present — skipping install."
              else
                echo "Installing Terraform $(TF_VERSION)..."
                curl -fsSL "https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip" -o /tmp/terraform.zip
                unzip -q /tmp/terraform.zip -d /tmp
                sudo mv /tmp/terraform /usr/local/bin/terraform
              fi
              terraform version
            displayName: "Install Terraform $(TF_VERSION)"

          # ------------------------------------------------------------------
          # 3. terraform init
          # ------------------------------------------------------------------
          - bash: terraform -chdir=$(TF_DIR) init -input=false
            displayName: "Terraform init"

          # ------------------------------------------------------------------
          # 4. terraform apply — spin up playwright-runner + Loki + Grafana
          # ------------------------------------------------------------------
          - bash: terraform -chdir=$(TF_DIR) apply -auto-approve -input=false
            displayName: "Terraform apply (start IaC stack)"

          # ------------------------------------------------------------------
          # 5. Wait for the playwright-runner container to be running
          # ------------------------------------------------------------------
          - script: |
              echo "Waiting for $(CONTAINER) to be running..."
              for i in $(seq 1 20); do
                STATUS=$(docker inspect --format='{{.State.Status}}' $(CONTAINER) 2>/dev/null || echo "missing")
                echo "  attempt $i: $STATUS"
                [ "$STATUS" = "running" ] && break
                sleep 3
              done
              if [ "$STATUS" != "running" ]; then
                echo "ERROR: Container did not start in time"
                exit 1
              fi
            displayName: Wait for container ready

          # ------------------------------------------------------------------
          # 6. Run smoke suite inside the container
          #    Results land in /robotkali/results inside the container, which
          #    is volume-mounted to $(RESULTS_DIR) on the agent host.
          # ------------------------------------------------------------------
          - script: |
              mkdir -p $(RESULTS_DIR) $(ALLURE_DIR)
              docker exec $(CONTAINER) python -m robot \
                --outputdir results \
                --variable HEADLESS_MODE:True \
                --listener allure_robotframework:results/allure-results \
                tests/smoke/
            displayName: Run smoke tests in container
            continueOnError: true

          # ------------------------------------------------------------------
          # 7. terraform destroy — ALWAYS runs so containers never leak
          #    between pipeline runs
          # ------------------------------------------------------------------
          - bash: terraform -chdir=$(TF_DIR) destroy -auto-approve -input=false
            displayName: "Terraform destroy (tear down IaC stack)"
            condition: always()

          # ------------------------------------------------------------------
          # 8. Publish Allure results
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: Publish Allure results
            condition: always()
            inputs:
              targetPath: $(ALLURE_DIR)
              artifact: allure-results-smoke
              publishLocation: pipeline

          # ------------------------------------------------------------------
          # 9. Publish Robot Framework HTML logs
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: Publish RF logs
            condition: always()
            inputs:
              targetPath: $(RESULTS_DIR)
              artifact: robot-logs-smoke
              publishLocation: pipeline

          # ------------------------------------------------------------------
          # 10. Publish browser traces on failure
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: Publish browser traces (on failure)
            condition: failed()
            inputs:
              targetPath: $(RESULTS_DIR)/browser/traces
              artifact: browser-traces-smoke
              publishLocation: pipeline

          # ------------------------------------------------------------------
          # 11. Email notification on any test failure — sends log.html
          # ------------------------------------------------------------------
          - template: templates/notify-on-failure.yml
            parameters:
              pipelineName: "QA Smoke Suite"
              artifactDir: $(RESULTS_DIR)

  # --------------------------------------------------------------------------
  # Report Stage — generate Allure HTML from the results artifact
  # --------------------------------------------------------------------------
  - stage: Report
    displayName: Publish Allure Report
    dependsOn: Test
    condition: always()

    jobs:
      - job: allure_report
        displayName: Generate Allure HTML Report

        steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download Allure results
            inputs:
              artifact: allure-results-smoke
              path: allure-results

          - script: |
              npm install -g allure-commandline --save-dev
              allure generate allure-results --clean -o allure-report
            displayName: Generate Allure HTML report

          - task: PublishPipelineArtifact@1
            displayName: Publish Allure HTML report
            inputs:
              targetPath: allure-report
              artifact: allure-report
              publishLocation: pipeline
