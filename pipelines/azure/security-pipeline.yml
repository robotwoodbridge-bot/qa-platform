# =============================================================================
# Azure Pipelines — Security Scan Pipeline
# =============================================================================
# HOW TO ACTIVATE:
#   Pipelines → New Pipeline → Azure Repos Git → qa-platform
#   → Existing Azure Pipelines YAML file → pipelines/azure/security-pipeline.yml
#
# REWRITTEN from the original temp/ci design, not just a path swap. The
# original ran Robot Framework natively on the CI agent and shelled out
# `docker pull`/`docker run` per scan tool, including frapsoft/nikto. The
# security gate debugging (see testings/security/README.md) found
# frapsoft/nikto's bundled Nikto too old to support this target's
# SNI-based routing, and switched Nikto to run natively via Kali's own apt
# package instead — inside qa-platform-security-runner specifically, which
# a bare Ubuntu CI agent doesn't have (no `nikto` binary at all). So this
# pipeline now provisions the real infra and execs into that container,
# the same proven-working pattern as smoke-pipeline.yml, instead of
# reimplementing a parallel native-agent flow that would fail immediately.
#
# Phase rollout:
#   Phase 1: Scaffold — manual trigger only
#   Phase 2: Baseline run — continueOnError: true (non-blocking, record findings)
#   Phase 3: Threshold enforcement — remove continueOnError, set failOnSeverity HIGH
#   Phase 4: Pre-release full scan — extend kali_scan.robot with a "full" mode
#
# Required secret pipeline variables: GRAFANA_ADMIN_PASSWORD,
# PACT_BROKER_DB_PASSWORD, GMAIL_USER, GMAIL_APP_PASSWORD
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    # Limit automatic triggers to security-related changes.
    # Phase 3: remove this filter to enforce the gate on every push.
    include:
      - testings/security/**
      - scripts/run_security.sh
      - infrastructure/modules/runner-security/**
      - infrastructure/docker/Dockerfile.security

pr:
  branches:
    include:
      - main

parameters:
  - name: targetUrl
    displayName: Target URL
    type: string
    default: https://practice.expandtesting.com

  - name: failOnSeverity
    displayName: Fail On Severity
    type: string
    default: MEDIUM
    values:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: "1.8.5"
  TF_DIR: $(Build.SourcesDirectory)/infrastructure/environments/local
  RESULTS_DIR: $(Build.SourcesDirectory)/testings/security/results
  CONTAINER: qa-platform-security-runner

stages:
  # --------------------------------------------------------------------------
  # continueOnError: true during Phase 1 & 2 — non-blocking.
  # Phase 3: remove continueOnError from both the job and the scan step.
  # --------------------------------------------------------------------------
  - stage: SecurityScan
    displayName: "Security Scan (ZAP / Nikto / Nmap)"
    jobs:
      - job: RunScans
        displayName: "Vulnerability Scans"
        timeoutInMinutes: 60
        continueOnError: true   # Phase 3: remove this line

        steps:
          - checkout: self
            displayName: "Checkout repository"

          - bash: |
              INSTALLED=$(terraform version -json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['terraform_version'])" 2>/dev/null || echo "none")
              if [ "$INSTALLED" = "$(TF_VERSION)" ]; then
                echo "Terraform $(TF_VERSION) already present — skipping install."
              else
                echo "Installing Terraform $(TF_VERSION)..."
                curl -fsSL "https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip" -o /tmp/terraform.zip
                unzip -q /tmp/terraform.zip -d /tmp
                sudo mv /tmp/terraform /usr/local/bin/terraform
              fi
              terraform version
            displayName: "Install Terraform $(TF_VERSION)"

          - bash: terraform -chdir=$(TF_DIR) init -input=false
            displayName: "Terraform init"

          # grafana_admin_password / pact_broker_db_password have no default
          # — required even though this pipeline only cares about the
          # security runner, because apply provisions the whole local stack
          # (no per-module apply is used anywhere in this repo's pipelines).
          - bash: terraform -chdir=$(TF_DIR) apply -auto-approve -input=false
            displayName: "Terraform apply (start IaC stack)"
            env:
              TF_VAR_grafana_admin_password: $(GRAFANA_ADMIN_PASSWORD)
              TF_VAR_pact_broker_db_password: $(PACT_BROKER_DB_PASSWORD)

          - script: |
              echo "Waiting for $(CONTAINER) to be running..."
              for i in $(seq 1 20); do
                STATUS=$(docker inspect --format='{{.State.Status}}' $(CONTAINER) 2>/dev/null || echo "missing")
                echo "  attempt $i: $STATUS"
                [ "$STATUS" = "running" ] && break
                sleep 3
              done
              if [ "$STATUS" != "running" ]; then
                echo "ERROR: Container did not start in time"
                exit 1
              fi
            displayName: Wait for container ready

          # kali_scan.robot's TARGET_URL / FAIL_ON_SEVERITY suite variables
          # are overridable via --variable, same as running it locally via
          # scripts/run_security.sh.
          - script: |
              mkdir -p $(RESULTS_DIR)
              docker exec $(CONTAINER) robot \
                --outputdir results \
                --variable TARGET_URL:${{ parameters.targetUrl }} \
                --variable FAIL_ON_SEVERITY:${{ parameters.failOnSeverity }} \
                --loglevel INFO \
                --name "Security Scan" \
                tests/
            displayName: "Run security scan suite"
            continueOnError: true   # Phase 3: remove this line

          - bash: terraform -chdir=$(TF_DIR) destroy -auto-approve -input=false
            displayName: "Terraform destroy (tear down IaC stack)"
            condition: always()
            env:
              TF_VAR_grafana_admin_password: $(GRAFANA_ADMIN_PASSWORD)
              TF_VAR_pact_broker_db_password: $(PACT_BROKER_DB_PASSWORD)

          # ------------------------------------------------------------------
          # Publish RF report
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: "Publish RF report"
            condition: always()
            inputs:
              targetPath: "$(RESULTS_DIR)/report.html"
              artifact: "security-rf-report"
              publishLocation: pipeline

          # ------------------------------------------------------------------
          # Publish raw scan output (ZAP JSON, Nikto CSV, Nmap XML)
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: "Publish raw scan findings"
            condition: always()
            inputs:
              targetPath: "$(RESULTS_DIR)"
              artifact: "security-raw-findings"
              publishLocation: pipeline

          # ------------------------------------------------------------------
          # Email notification on any test failure — sends log.html
          # ------------------------------------------------------------------
          - template: templates/notify-on-failure.yml
            parameters:
              pipelineName: "Security Scan"
              artifactDir: $(RESULTS_DIR)
