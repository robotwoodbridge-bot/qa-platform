# =============================================================================
# Azure Pipelines — Disaster Recovery Suite
# =============================================================================
# Mirror of .github/workflows/dr-pipeline.yml.
#
# What it does:
#   1. terraform apply → spins up qa-platform-loki (and the rest of the
#      local stack, same as every other Terraform-backed pipeline here —
#      no per-module apply is used anywhere in this repo's pipelines).
#   2. Runs the DR suite directly on the agent (pip install, not docker exec)
#      — testings/dr/ was designed to call `docker stop`/`docker start`
#      against the sibling qa-platform-loki container from the HOST, since
#      doing that from inside another container would need Docker-outside-
#      of-Docker (the tradeoff testings/security/ accepted, not set up
#      here). A Microsoft-hosted agent already has real Docker daemon
#      access, so it plays the same "host" role scripts/run_dr.sh assumes
#      locally.
#   3. terraform destroy → tears down all containers (always runs).
#   4. Publishes Allure results and RF logs; emails log.html on failure.
#
# Path-restricted like security-pipeline.yml, not unrestricted like
# smoke-pipeline.yml — this suite stops/restarts a real container mid-run,
# so it only runs automatically when DR-related files actually change.
#
# Required secret pipeline variables: GRAFANA_ADMIN_PASSWORD,
# PACT_BROKER_DB_PASSWORD, GMAIL_USER, GMAIL_APP_PASSWORD
#
# HOW TO ACTIVATE:
#   Pipelines → New Pipeline → Azure Repos Git → qa-platform
#   → Existing Azure Pipelines YAML file → pipelines/azure/dr-pipeline.yml
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - testings/dr/**

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: "1.8.5"
  TF_DIR: $(Build.SourcesDirectory)/infrastructure/environments/local
  DR_DIR: $(Build.SourcesDirectory)/testings/dr
  RESULTS_DIR: $(Build.SourcesDirectory)/testings/dr/results
  ALLURE_DIR: $(Build.SourcesDirectory)/testings/dr/results/allure-results
  LOKI_CONTAINER: qa-platform-loki

stages:
  - stage: DisasterRecovery
    displayName: "Disaster Recovery Suite"
    jobs:
      - job: dr_test
        displayName: "Loki outage/recovery (RTO/RPO)"
        timeoutInMinutes: 20

        steps:
          - checkout: self
            displayName: "Checkout repository"

          - bash: |
              INSTALLED=$(terraform version -json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['terraform_version'])" 2>/dev/null || echo "none")
              if [ "$INSTALLED" = "$(TF_VERSION)" ]; then
                echo "Terraform $(TF_VERSION) already present — skipping install."
              else
                echo "Installing Terraform $(TF_VERSION)..."
                curl -fsSL "https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip" -o /tmp/terraform.zip
                unzip -q /tmp/terraform.zip -d /tmp
                sudo mv /tmp/terraform /usr/local/bin/terraform
              fi
              terraform version
            displayName: "Install Terraform $(TF_VERSION)"

          - bash: terraform -chdir=$(TF_DIR) init -input=false
            displayName: "Terraform init"

          - bash: terraform -chdir=$(TF_DIR) apply -auto-approve -input=false
            displayName: "Terraform apply (start IaC stack)"
            env:
              TF_VAR_grafana_admin_password: $(GRAFANA_ADMIN_PASSWORD)
              TF_VAR_pact_broker_db_password: $(PACT_BROKER_DB_PASSWORD)

          - script: |
              echo "Waiting for $(LOKI_CONTAINER) to be running..."
              for i in $(seq 1 20); do
                STATUS=$(docker inspect --format='{{.State.Status}}' $(LOKI_CONTAINER) 2>/dev/null || echo "missing")
                echo "  attempt $i: $STATUS"
                [ "$STATUS" = "running" ] && break
                sleep 3
              done
              if [ "$STATUS" != "running" ]; then
                echo "ERROR: Container did not start in time"
                exit 1
              fi
            displayName: "Wait for container ready"

          - task: UsePythonVersion@0
            displayName: Use Python 3.12
            inputs:
              versionSpec: "3.12"

          - script: pip install -r testings/dr/requirements.txt
            displayName: "Install DR test dependencies"

          # Runs directly on the agent (not docker exec) — see header comment.
          - script: |
              mkdir -p $(RESULTS_DIR) $(ALLURE_DIR)
              python -m robot \
                --outputdir $(RESULTS_DIR) \
                --listener allure_robotframework:$(ALLURE_DIR) \
                --loglevel INFO \
                --name "Disaster Recovery" \
                testings/dr/tests/
            displayName: "Run DR suite"

          - bash: terraform -chdir=$(TF_DIR) destroy -auto-approve -input=false
            displayName: "Terraform destroy (tear down IaC stack)"
            condition: always()
            env:
              TF_VAR_grafana_admin_password: $(GRAFANA_ADMIN_PASSWORD)
              TF_VAR_pact_broker_db_password: $(PACT_BROKER_DB_PASSWORD)

          - task: PublishPipelineArtifact@1
            displayName: "Publish Allure results"
            condition: always()
            inputs:
              targetPath: $(ALLURE_DIR)
              artifact: allure-results-dr
              publishLocation: pipeline

          - task: PublishPipelineArtifact@1
            displayName: "Publish RF logs"
            condition: always()
            inputs:
              targetPath: $(RESULTS_DIR)
              artifact: robot-logs-dr
              publishLocation: pipeline

          - template: templates/notify-on-failure.yml
            parameters:
              pipelineName: "Disaster Recovery Suite"
              artifactDir: $(RESULTS_DIR)

  - stage: Report
    displayName: Publish Allure Report
    dependsOn: DisasterRecovery
    condition: always()
    jobs:
      - job: allure_report
        displayName: Generate Allure HTML Report
        steps:
          - checkout: none

          - task: DownloadPipelineArtifact@2
            displayName: Download Allure results
            inputs:
              artifact: allure-results-dr
              path: allure-results

          - script: |
              npm install -g allure-commandline
              allure generate allure-results --clean -o allure-report
            displayName: Generate Allure HTML report

          - task: PublishPipelineArtifact@1
            displayName: Publish Allure HTML report
            inputs:
              targetPath: allure-report
              artifact: allure-report-dr
              publishLocation: pipeline
