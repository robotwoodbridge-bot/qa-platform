# =============================================================================
# Azure Pipelines — Accessibility Suite (WCAG 2.1 AA)
# =============================================================================
# Mirror of .github/workflows/accessibility-pipeline.yml.
#
# Runs the axe-core suite (testings/accessibility/tests/) directly on the
# agent — same shape as performance-pipeline.yml (also Browser library /
# Playwright), which already established that these suites don't need the
# Docker/Terraform stack to run in CI, just the browser installed locally.
#
# Runs nightly (trend data / catch the third-party page changing under us)
# and on pushes that touch accessibility-related files.
#
# Required secret pipeline variables: GMAIL_USER, GMAIL_APP_PASSWORD
#
# HOW TO ACTIVATE:
#   Pipelines → New Pipeline → Azure Repos Git → qa-platform
#   → Existing Azure Pipelines YAML file → pipelines/azure/accessibility-pipeline.yml
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - testings/accessibility/**

pr:
  branches:
    include:
      - main

schedules:
  # Nightly run at 02:30 UTC — same rationale as performance-pipeline.yml's
  # nightly run: catch drift even with no code changes on our side.
  - cron: "30 2 * * *"
    displayName: Nightly accessibility run
    branches:
      include:
        - main
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.12"
  ACCESSIBILITY_DIR: $(Build.SourcesDirectory)/testings/accessibility
  RESULTS_DIR: $(Build.SourcesDirectory)/testings/accessibility/results
  ALLURE_DIR: $(Build.SourcesDirectory)/testings/accessibility/results/allure-results

stages:
  - stage: Accessibility
    displayName: "Accessibility Suite (WCAG 2.1 AA)"
    jobs:
      - job: accessibility
        displayName: axe-core
        timeoutInMinutes: 15

        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python $(PYTHON_VERSION)
            inputs:
              versionSpec: $(PYTHON_VERSION)

          # Same Browser library stack as testings/gui/robot/web — this
          # engine reuses that image's dependency set
          # (infrastructure/docker/Dockerfile.robot-web).
          - script: pip install -r infrastructure/docker/requirements-robot-web.txt
            displayName: Install Python dependencies

          - script: |
              playwright install --with-deps chromium
              python -m Browser.entry init
            displayName: Install Playwright browsers + Browser library node deps

          # axe-core isn't committed to the repo (~700KB minified) —
          # installed as a Node dependency (testings/accessibility/package.json)
          # instead.
          - script: npm install --no-fund --no-audit
            workingDirectory: $(ACCESSIBILITY_DIR)
            displayName: Install axe-core

          - script: |
              mkdir -p $(RESULTS_DIR) $(ALLURE_DIR)
              python -m robot \
                --outputdir $(RESULTS_DIR) \
                --variable HEADLESS_MODE:True \
                --listener allure_robotframework:$(ALLURE_DIR) \
                --loglevel INFO \
                --name "Accessibility Suite" \
                testings/accessibility/tests/
            displayName: Run accessibility suite

          - task: PublishPipelineArtifact@1
            displayName: Publish Allure results
            condition: always()
            inputs:
              targetPath: $(ALLURE_DIR)
              artifact: allure-results-accessibility
              publishLocation: pipeline

          - task: PublishPipelineArtifact@1
            displayName: Publish RF logs
            condition: always()
            inputs:
              targetPath: $(RESULTS_DIR)
              artifact: robot-logs-accessibility
              publishLocation: pipeline

          - template: templates/notify-on-failure.yml
            parameters:
              pipelineName: "Accessibility Suite"
              artifactDir: $(RESULTS_DIR)

  - stage: Report
    displayName: Publish Allure Report
    dependsOn: Accessibility
    condition: always()
    jobs:
      - job: allure_report
        displayName: Generate Allure HTML Report
        steps:
          - checkout: none

          - task: DownloadPipelineArtifact@2
            displayName: Download Allure results
            inputs:
              artifact: allure-results-accessibility
              path: allure-results

          - script: |
              npm install -g allure-commandline
              allure generate allure-results --clean -o allure-report
            displayName: Generate Allure HTML report

          - task: PublishPipelineArtifact@1
            displayName: Publish Allure HTML report
            inputs:
              targetPath: allure-report
              artifact: allure-report-accessibility
              publishLocation: pipeline
