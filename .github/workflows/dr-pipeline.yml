# =============================================================================
# GitHub Actions — Disaster Recovery Suite
# =============================================================================
# Mirror of pipelines/azure/dr-pipeline.yml.
#
# What it does:
#   1. terraform apply → spins up qa-platform-loki (and the rest of the
#      local stack, same as every other Terraform-backed pipeline here —
#      no per-module apply is used anywhere in this repo's pipelines).
#   2. Runs the DR suite directly on the runner (pip install, not docker exec)
#      — testings/dr/ was designed to call `docker stop`/`docker start`
#      against the sibling qa-platform-loki container from the HOST, since
#      doing that from inside another container would need Docker-outside-
#      of-Docker (the tradeoff testings/security/ accepted, not set up
#      here). A GitHub-hosted runner already has real Docker daemon access,
#      so it plays the same "host" role scripts/run_dr.sh assumes locally.
#   3. terraform destroy → tears down all containers (always runs).
#   4. Publishes Allure results and RF logs; emails log.html on failure.
#
# Path-restricted like security-pipeline.yml, not unrestricted like
# smoke-pipeline.yml — this suite stops/restarts a real container mid-run,
# so it only runs automatically when DR-related files actually change.
#
# Required secrets: GRAFANA_ADMIN_PASSWORD, PACT_BROKER_DB_PASSWORD,
# GMAIL_USER, GMAIL_APP_PASSWORD
# =============================================================================

name: Disaster Recovery Suite

on:
  push:
    branches: [main, develop]
    paths:
      - testings/dr/**
      - .github/workflows/dr-pipeline.yml
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TF_VERSION: "1.8.5"
  TF_DIR: ${{ github.workspace }}/infrastructure/environments/local
  DR_DIR: ${{ github.workspace }}/testings/dr
  RESULTS_DIR: ${{ github.workspace }}/testings/dr/results
  ALLURE_DIR: ${{ github.workspace }}/testings/dr/results/allure-results
  LOKI_CONTAINER: qa-platform-loki

jobs:
  dr-test:
    name: Loki outage/recovery (RTO/RPO)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform ${{ env.TF_VERSION }}
        run: |
          INSTALLED=$(terraform version -json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['terraform_version'])" 2>/dev/null || echo "none")
          if [ "$INSTALLED" = "${TF_VERSION}" ]; then
            echo "Terraform ${TF_VERSION} already present — skipping install."
          else
            echo "Installing Terraform ${TF_VERSION}..."
            curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
            unzip -q /tmp/terraform.zip -d /tmp
            sudo mv /tmp/terraform /usr/local/bin/terraform
          fi
          terraform version

      - name: Terraform init
        run: terraform -chdir="${TF_DIR}" init -input=false

      - name: Terraform apply (start IaC stack)
        run: terraform -chdir="${TF_DIR}" apply -auto-approve -input=false
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_pact_broker_db_password: ${{ secrets.PACT_BROKER_DB_PASSWORD }}

      - name: Wait for container ready
        run: |
          echo "Waiting for ${LOKI_CONTAINER} to be running..."
          STATUS="missing"
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Status}}' "${LOKI_CONTAINER}" 2>/dev/null || echo "missing")
            echo "  attempt $i: $STATUS"
            [ "$STATUS" = "running" ] && break
            sleep 3
          done
          if [ "$STATUS" != "running" ]; then
            echo "ERROR: Container did not start in time"
            exit 1
          fi

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DR test dependencies
        run: pip install -r testings/dr/requirements.txt

      # Runs directly on the runner (not docker exec) — see header comment.
      - name: Run DR suite
        run: |
          mkdir -p "${RESULTS_DIR}" "${ALLURE_DIR}"
          python -m robot \
            --outputdir "${RESULTS_DIR}" \
            --listener allure_robotframework:"${ALLURE_DIR}" \
            --loglevel INFO \
            --name "Disaster Recovery" \
            testings/dr/tests/

      - name: Terraform destroy (tear down IaC stack)
        if: always()
        run: terraform -chdir="${TF_DIR}" destroy -auto-approve -input=false
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_pact_broker_db_password: ${{ secrets.PACT_BROKER_DB_PASSWORD }}

      - name: Publish Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-dr
          path: ${{ env.ALLURE_DIR }}

      - name: Publish RF logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-logs-dr
          path: ${{ env.RESULTS_DIR }}

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          pipeline-name: "Disaster Recovery Suite"
          artifact-dir: ${{ env.RESULTS_DIR }}
          gmail-user: ${{ secrets.GMAIL_USER }}
          gmail-app-password: ${{ secrets.GMAIL_APP_PASSWORD }}

  report:
    name: Generate Allure HTML Report
    runs-on: ubuntu-latest
    needs: dr-test
    if: always()

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-dr
          path: allure-results

      - name: Generate Allure HTML report
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Publish Allure HTML report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-dr
          path: allure-report
